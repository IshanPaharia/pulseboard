services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pulseboard}
      POSTGRES_USER: ${POSTGRES_USER:-pulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulse}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: prod
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER:-pulse}:${POSTGRES_PASSWORD:-pulse}@postgres:5432/${POSTGRES_DB:-pulseboard}
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_API_URL: ${PUBLIC_URL:-http://localhost}
    expose:
      - "3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: prod
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_URL:-http://localhost}
    restart: always
    depends_on:
      - api
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:3001
      NEXT_PUBLIC_API_URL: ${PUBLIC_URL:-http://localhost}
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - api
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:
